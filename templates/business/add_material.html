{% extends "business/base.html" %}

{% block content %}

<style>

.page-bg{
background: linear-gradient(120deg,#0f2027,#2c5364);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.material-card{
width:100%;
max-width:450px;
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 12px 30px rgba(0,0,0,0.2);
}

.title{
text-align:center;
font-weight:600;
margin-bottom:20px;
}

.form-control{
height:45px;
border-radius:8px;
}

textarea.form-control{
height:auto;
}

.btn-submit{
width:100%;
height:45px;
border-radius:8px;
font-weight:600;
}

.map-preview{
width:100%;
height:200px;
border-radius:8px;
border:1px solid #ddd;
margin-bottom:15px;
}

</style>

<div class="page-bg">

<div class="material-card">

<h3 class="title">Add Construction Material</h3>

<form method="POST" enctype="multipart/form-data">

<input name="title" placeholder="Material Name (Cement, Sand, Bricks...)" class="form-control mb-3" required>

<input name="price" placeholder="Price ₹" class="form-control mb-3" required>

<input name="quantity" placeholder="Quantity (KG / Ton / Bag)" class="form-control mb-3">

<input name="location" placeholder="Location / Area" class="form-control mb-3" required>

<input 
name="map_link"
id="map_link"
placeholder="Google Maps Embed Link"
class="form-control mb-3"
oninput="loadMap()">

<iframe id="map_preview" class="map-preview" style="display:none;"></iframe>

<label class="mb-1">Material Image</label>

<input type="file" name="image1" class="form-control mb-3">

<textarea name="description" placeholder="Material Description" class="form-control mb-3"></textarea>

<button class="btn btn-success btn-submit">

Save Material

</button>

</form>

</div>

</div>

<script>

function loadMap(){

let link = document.getElementById("map_link").value;

let frame = document.getElementById("map_preview");

if(link){

frame.style.display = "block";
frame.src = link;

}

}

</script>

{% endblock %}
