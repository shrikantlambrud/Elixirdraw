{% extends "base.html" %}

{% block title %}Login — ElixirDraw{% endblock %}

{% block content %}

<style>

  /* ── PAGE ── */
  .login-page {
    min-height: 100vh;
    background: linear-gradient(150deg, #f0f9ff 0%, #f8fafc 60%, #e0f2fe 100%);
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 52px 16px 72px;
  }

  .login-wrapper {
    width: 100%;
    max-width: 420px;
  }

  /* ── PAGE HEADING ── */
  .login-top {
    text-align: center;
    margin-bottom: 28px;
  }

  .login-top-icon {
    width: 56px;
    height: 56px;
    background: linear-gradient(135deg, #0ea5e9, #0284c7);
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 16px;
    box-shadow: 0 6px 18px rgba(14,165,233,0.28);
  }

  .login-top-icon svg {
    width: 26px;
    height: 26px;
    fill: none;
    stroke: #fff;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .login-top h1 {
    font-size: 24px;
    font-weight: 800;
    color: #0f172a;
    letter-spacing: -0.5px;
    margin: 0 0 6px;
  }

  .login-top p {
    font-size: 14px;
    color: #64748b;
    margin: 0;
  }

  /* ── CARD ── */
  .login-card {
    background: #fff;
    border-radius: 20px;
    border: 1px solid #e0f2fe;
    box-shadow: 0 2px 24px rgba(14,165,233,0.08), 0 1px 4px rgba(0,0,0,0.04);
    overflow: hidden;
  }

  .login-card::before {
    content: '';
    display: block;
    height: 4px;
    background: linear-gradient(90deg, #0284c7 0%, #38bdf8 50%, #7dd3fc 100%);
  }

  .card-body {
    padding: 36px 40px 40px;
  }

  /* ── FIELD GROUP ── */
  .field-group {
    margin-bottom: 18px;
  }

  .field-label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: #334155;
    margin-bottom: 7px;
  }

  /* ── INPUT WITH ICON ── */
  .input-wrap {
    display: flex;
    border: 1.5px solid #e2e8f0;
    border-radius: 10px;
    overflow: hidden;
    background: #fff;
    transition: border-color 0.18s, box-shadow 0.18s;
  }

  .input-wrap:focus-within {
    border-color: #0ea5e9;
    box-shadow: 0 0 0 3px rgba(14,165,233,0.13);
  }

  .input-icon {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 46px;
    background: #f0f9ff;
    border-right: 1.5px solid #e0f2fe;
    flex-shrink: 0;
    transition: background 0.15s, border-color 0.15s;
  }

  .input-wrap:focus-within .input-icon {
    background: #e0f2fe;
    border-right-color: #bae6fd;
  }

  .input-icon svg {
    width: 17px;
    height: 17px;
    stroke: #64a7c0;
    fill: none;
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
    transition: stroke 0.15s;
  }

  .input-wrap:focus-within .input-icon svg {
    stroke: #0284c7;
  }

  .input-wrap .form-control {
    flex: 1;
    border: none;
    border-radius: 0;
    padding: 12px 14px;
    font-size: 14px;
    color: #0f172a;
    background: transparent;
    box-shadow: none;
    outline: none;
    font-family: inherit;
  }

  .input-wrap .form-control::placeholder { color: #94a3b8; }

  /* ── FORGOT ROW ── */
  .forgot-row {
    display: flex;
    justify-content: flex-end;
    margin-bottom: 22px;
    margin-top: -6px;
  }

  .forgot-link {
    font-size: 13px;
    font-weight: 500;
    color: #0284c7;
    text-decoration: none;
    transition: color 0.15s;
  }

  .forgot-link:hover { color: #0ea5e9; text-decoration: underline; }

  /* ── SUBMIT BUTTON ── */
  .btn-login-submit {
    width: 100%;
    height: 50px;
    background: linear-gradient(135deg, #0ea5e9 0%, #0284c7 100%);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    box-shadow: 0 4px 14px rgba(14,165,233,0.25);
    transition: box-shadow 0.18s, transform 0.12s, opacity 0.15s;
  }

  .btn-login-submit svg {
    width: 18px;
    height: 18px;
    stroke: #fff;
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .btn-login-submit:hover {
    box-shadow: 0 8px 24px rgba(14,165,233,0.38);
    transform: translateY(-2px);
    opacity: 0.95;
    color: #fff;
  }

  .btn-login-submit:active { transform: scale(0.985); }

  /* ── OR DIVIDER ── */
  .or-divider {
    display: flex;
    align-items: center;
    gap: 14px;
    margin: 26px 0 22px;
  }

  .or-divider::before,
  .or-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: #e9f5fb;
  }

  .or-divider span {
    font-size: 12px;
    color: #a0bfcc;
    font-weight: 500;
    white-space: nowrap;
  }

  /* ── REGISTER LINKS ── */
  .reg-links {
    text-align: center;
  }

  .reg-links p {
    font-size: 13px;
    color: #64748b;
    margin-bottom: 12px;
  }

  .reg-links-row {
    display: flex;
    gap: 10px;
    justify-content: center;
  }

  .btn-reg-link {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 10px 16px;
    border-radius: 10px;
    border: 1.5px solid #bae6fd;
    color: #0284c7;
    font-size: 13px;
    font-weight: 600;
    font-family: inherit;
    text-decoration: none;
    background: #f0f9ff;
    transition: background 0.15s, border-color 0.15s, box-shadow 0.15s;
  }

  .btn-reg-link svg {
    width: 15px;
    height: 15px;
    stroke: #0284c7;
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
    flex-shrink: 0;
  }

  .btn-reg-link:hover {
    background: #e0f2fe;
    border-color: #0ea5e9;
    box-shadow: 0 2px 10px rgba(14,165,233,0.12);
    color: #0284c7;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 480px) {
    .card-body { padding: 28px 22px 32px; }
    .login-top h1 { font-size: 20px; }
    .reg-links-row { flex-direction: column; }
  }

</style>

<div class="login-page">
  <div class="login-wrapper">

    <!-- Heading -->
    <div class="login-top">
      <div class="login-top-icon">
        <svg viewBox="0 0 24 24"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
      </div>
      <h1>Welcome Back</h1>
      <p>Sign in to your ElixirDraw account</p>
    </div>

    <!-- Card -->
    <div class="login-card">
      <div class="card-body">

        <form method="POST">

          <!-- EMAIL -->
          <div class="field-group">
            <label class="field-label">Email</label>
            <div class="input-wrap">
              <div class="input-icon">
                <svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
              </div>
              <input type="email" name="email"
                     class="form-control" placeholder="Enter your email" required>
            </div>
          </div>

          <!-- PASSWORD -->
          <div class="field-group">
            <label class="field-label">Password</label>
            <div class="input-wrap">
              <div class="input-icon">
                <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              </div>
              <input type="password" name="password"
                     class="form-control" placeholder="Enter password" required>
            </div>
          </div>

          <!-- FORGOT PASSWORD -->
          <div class="d-flex justify-content-between mb-3">
            <a href="/forgot-password" class="forgot-link">Forgot Password?</a>
          </div>

          <!-- LOGIN BUTTON -->
          <button class="btn-login-submit" type="submit">
            <svg viewBox="0 0 24 24"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
            Login
          </button>

        </form>

        <!-- Divider -->
        <div class="or-divider"><span>don't have an account?</span></div>

        <!-- Register links -->
        <div class="reg-links">
          <p>Don't have an account?</p>
          <div class="reg-links-row">
            <a href="/register" class="btn-reg-link">
              <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              Personal Register
            </a>
            <a href="/business_register" class="btn-reg-link">
              <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
              Business Register
            </a>
          </div>
        </div>

      </div>
    </div>

  </div>
</div>

{% endblock %}
