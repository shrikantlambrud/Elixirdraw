{% extends "base.html" %}

{% block title %}Verify OTP — ElixirDraw{% endblock %}

{% block content %}

<style>

  .otp-page {
    min-height: 100vh;
    background: linear-gradient(150deg, #f0f9ff 0%, #f8fafc 60%, #e0f2fe 100%);
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 52px 16px 72px;
  }

  .otp-wrapper {
    width: 100%;
    max-width: 420px;
  }

  .otp-top {
    text-align: center;
    margin-bottom: 28px;
  }

  .otp-top-icon {
    width: 56px;
    height: 56px;
    background: linear-gradient(135deg, #0ea5e9, #0284c7);
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 16px;
    box-shadow: 0 6px 18px rgba(14,165,233,0.28);
  }

  .otp-top-icon svg {
    width: 26px;
    height: 26px;
    fill: none;
    stroke: #fff;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .otp-top h1 {
    font-size: 24px;
    font-weight: 800;
    color: #0f172a;
    letter-spacing: -0.5px;
    margin: 0 0 6px;
  }

  .otp-top p {
    font-size: 14px;
    color: #64748b;
    margin: 0;
    line-height: 1.6;
  }

  .otp-card {
    background: #fff;
    border-radius: 20px;
    border: 1px solid #e0f2fe;
    box-shadow: 0 2px 24px rgba(14,165,233,0.08), 0 1px 4px rgba(0,0,0,0.04);
    overflow: hidden;
  }

  .otp-card::before {
    content: '';
    display: block;
    height: 4px;
    background: linear-gradient(90deg, #0284c7 0%, #38bdf8 50%, #7dd3fc 100%);
  }

  .card-body {
    padding: 36px 40px 40px;
  }

  .field-label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: #334155;
    margin-bottom: 7px;
  }

  /* OTP input */
  .input-wrap {
    display: flex;
    border: 1.5px solid #e2e8f0;
    border-radius: 10px;
    overflow: hidden;
    background: #fff;
    transition: border-color 0.18s, box-shadow 0.18s;
    margin-bottom: 22px;
  }

  .input-wrap:focus-within {
    border-color: #0ea5e9;
    box-shadow: 0 0 0 3px rgba(14,165,233,0.13);
  }

  .input-icon {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 46px;
    background: #f0f9ff;
    border-right: 1.5px solid #e0f2fe;
    flex-shrink: 0;
    transition: background 0.15s, border-color 0.15s;
  }

  .input-wrap:focus-within .input-icon {
    background: #e0f2fe;
    border-right-color: #bae6fd;
  }

  .input-icon svg {
    width: 17px;
    height: 17px;
    stroke: #64a7c0;
    fill: none;
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
    transition: stroke 0.15s;
  }

  .input-wrap:focus-within .input-icon svg { stroke: #0284c7; }

  .input-wrap .form-control {
    flex: 1;
    border: none;
    border-radius: 0;
    padding: 12px 14px;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 8px;
    color: #0f172a;
    background: transparent;
    box-shadow: none;
    outline: none;
    font-family: inherit;
    text-align: center;
  }

  .input-wrap .form-control::placeholder {
    color: #cbd5e1;
    letter-spacing: 6px;
    font-weight: 400;
    font-size: 16px;
  }

  /* button */
  .btn-verify {
    width: 100%;
    height: 50px;
    background: linear-gradient(135deg, #0ea5e9 0%, #0284c7 100%);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    box-shadow: 0 4px 14px rgba(14,165,233,0.25);
    transition: box-shadow 0.18s, transform 0.12s, opacity 0.15s;
  }

  .btn-verify svg {
    width: 18px;
    height: 18px;
    stroke: #fff;
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .btn-verify:hover {
    box-shadow: 0 8px 24px rgba(14,165,233,0.38);
    transform: translateY(-2px);
    opacity: 0.95;
    color: #fff;
  }

  .btn-verify:active { transform: scale(0.985); }

  /* resend */
  .resend-row {
    text-align: center;
    margin-top: 20px;
  }

  .resend-row small {
    font-size: 13px;
    color: #64748b;
  }

  .resend-row a {
    font-weight: 600;
    color: #0284c7;
    text-decoration: none;
  }

  .resend-row a:hover { text-decoration: underline; color: #0ea5e9; }

  @media (max-width: 480px) {
    .card-body { padding: 28px 22px 32px; }
    .otp-top h1 { font-size: 20px; }
  }

</style>

<div class="otp-page">
  <div class="otp-wrapper">

    <div class="otp-top">
      <div class="otp-top-icon">
        <svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      </div>
      <h1>Verify OTP</h1>
      <p>Enter the 6-digit OTP sent to your registered email</p>
    </div>

    <div class="otp-card">
      <div class="card-body">

        <form method="POST">

          <div class="mb-3">
            <label class="form-label field-label">OTP Code</label>
            <div class="input-wrap">
              <div class="input-icon">
                <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              </div>
              <input
                type="text"
                name="otp"
                class="form-control text-center"
                placeholder="------"
                maxlength="6"
                required
              >
            </div>
          </div>

          <button class="btn-verify" type="submit">
            <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
            Verify OTP
          </button>

        </form>

        <div class="resend-row">
          <small>
            Didn't receive OTP?
            <a href="#" class="text-decoration-none">Resend</a>
          </small>
        </div>

      </div>
    </div>

  </div>
</div>

{% endblock %}
