<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Personal Panel{% endblock %}</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>

    /* ── VARIABLES ── */
    :root {
      --primary:        #0ea5e9;
      --primary-dark:   #0284c7;
      --primary-light:  #e0f2fe;
      --primary-xlight: #f0f9ff;
      --white:          #ffffff;
      --text-dark:      #0f172a;
      --text-mid:       #334155;
      --text-muted:     #64748b;
      --border:         #e2e8f0;
      --bg-page:        #f0f9ff;
      --shadow-nav:     0 1px 12px rgba(14,165,233,0.10);
      --font:           'Plus Jakarta Sans', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: var(--font);
      background: var(--bg-page);
      color: var(--text-dark);
      margin: 0;
      padding-bottom: 72px;
    }

    /* ── NAVBAR ── */
    .site-navbar {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      box-shadow: var(--shadow-nav);
      position: sticky;
      top: 0;
      z-index: 1000;
      padding: 0;
    }

    .site-navbar .container {
      height: 64px;
      display: flex;
      align-items: center;
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      flex-shrink: 0;
    }

    .nav-brand-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 17px;
      flex-shrink: 0;
    }

    .nav-brand-name {
      font-size: 16px;
      font-weight: 800;
      color: var(--text-dark);
      letter-spacing: -0.3px;
    }

    .nav-brand-name span { color: var(--primary); }

    .site-navbar .navbar-toggler {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 5px 9px;
      margin-left: auto;
    }

    .site-navbar .navbar-toggler:focus {
      box-shadow: 0 0 0 3px rgba(14,165,233,0.15);
    }

    .site-navbar .navbar-nav {
      align-items: center;
      gap: 2px;
    }

    .site-navbar .nav-link {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-mid);
      padding: 7px 12px;
      border-radius: 8px;
      transition: background 0.15s, color 0.15s;
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    .site-navbar .nav-link i { font-size: 15px; }

    .site-navbar .nav-link:hover {
      background: var(--primary-xlight);
      color: var(--primary-dark);
    }

    .site-navbar .nav-link.active {
      background: var(--primary-light);
      color: var(--primary-dark);
      font-weight: 600;
    }

    .nav-logout {
      font-size: 13px;
      font-weight: 600;
      padding: 7px 14px;
      border-radius: 8px;
      border: 1.5px solid #fecaca;
      color: #dc2626;
      background: #fff5f5;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background 0.15s, border-color 0.15s;
      white-space: nowrap;
      margin-left: 4px;
    }

    .nav-logout:hover {
      background: #fee2e2;
      border-color: #fca5a5;
      color: #dc2626;
    }

    /* collapsed mobile nav */
    @media (max-width: 991px) {
      .site-navbar .container { height: 60px; }

      .site-navbar .navbar-collapse {
        background: var(--white);
        border-top: 1px solid var(--border);
        padding: 10px 0 14px;
        margin: 0 -12px;
        padding-left: 12px;
        padding-right: 12px;
      }

      .site-navbar .navbar-nav { gap: 0; align-items: stretch; }

      .site-navbar .nav-link {
        padding: 11px 12px;
        border-radius: 0;
        border-bottom: 1px solid var(--border);
      }

      .nav-logout {
        margin: 10px 0 0;
        border-radius: 8px;
        justify-content: center;
      }
    }

    /* ── MAIN CONTENT ── */
    .main-content {
      padding: 24px 0;
    }

    /* ── CARDS ── */
    .card {
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 2px 12px rgba(14,165,233,0.07);
      transition: transform 0.2s, box-shadow 0.2s;
      background: var(--white);
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 6px 24px rgba(14,165,233,0.14);
    }

    /* ── FOOTER ── */
    .site-footer {
      background: var(--white);
      border-top: 1px solid var(--border);
      text-align: center;
      padding: 14px;
      font-size: 12px;
      color: var(--text-muted);
    }

    /* ── MOBILE BOTTOM NAV ── */
    .mobile-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: var(--white);
      border-top: 1px solid var(--border);
      box-shadow: 0 -4px 16px rgba(14,165,233,0.08);
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 6px 0 8px;
      z-index: 999;
    }

    .mob-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      text-decoration: none;
      color: var(--text-muted);
      font-size: 10px;
      font-weight: 500;
      padding: 4px 8px;
      border-radius: 10px;
      transition: color 0.15s, background 0.15s;
      min-width: 50px;
    }

    .mob-item i {
      font-size: 19px;
      display: block;
      line-height: 1;
    }

    .mob-item.active,
    .mob-item:hover {
      color: var(--primary);
      background: var(--primary-xlight);
    }

    .mob-item.mob-logout {
      color: #dc2626;
    }

    .mob-item.mob-logout:hover {
      background: #fff5f5;
      color: #dc2626;
    }

    @media (min-width: 768px) {
      .mobile-nav { display: none; }
      body { padding-bottom: 0; }
    }

  </style>

</head>
<body>

  <!-- ── NAVBAR ── -->
  <nav class="site-navbar navbar navbar-expand-lg">
    <div class="container">

      <a class="nav-brand navbar-brand" href="/personal/dashboard">
        <div class="nav-brand-icon"><i class="bi bi-house-fill"></i></div>
        <span class="nav-brand-name">Personal <span>Panel</span></span>
      </a>

      <button class="navbar-toggler" type="button"
              data-bs-toggle="collapse" data-bs-target="#personalNav"
              aria-controls="personalNav" aria-expanded="false" aria-label="Toggle navigation">
        <i class="bi bi-list" style="font-size:20px; color:var(--text-mid);"></i>
      </button>

      <div class="collapse navbar-collapse" id="personalNav">
        <ul class="navbar-nav ms-auto align-items-lg-center">

          <li class="nav-item">
            <a class="nav-link {% if '/personal/dashboard' in request.path %}active{% endif %}"
               href="/personal/dashboard">
              <i class="bi bi-speedometer2"></i> Dashboard
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link {% if '/personal/properties' in request.path %}active{% endif %}"
               href="/personal/properties">
              <i class="bi bi-building"></i> Properties
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link {% if '/personal/add_rent' in request.path %}active{% endif %}"
               href="/personal/add_rent">
              <i class="bi bi-house-door"></i> Add Rent
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link {% if '/personal/materials' in request.path %}active{% endif %}"
               href="/personal/materials">
              <i class="bi bi-box"></i> Materials
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link {% if '/personal/wallet' in request.path %}active{% endif %}"
               href="/personal/wallet">
              <i class="bi bi-wallet2"></i> Wallet
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link {% if '/personal/profile' in request.path %}active{% endif %}"
               href="/personal/profile">
              <i class="bi bi-person-circle"></i> Profile
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-logout" href="/logout">
              <i class="bi bi-box-arrow-right"></i> Logout
            </a>
          </li>

        </ul>
      </div>

    </div>
  </nav>

   <!-- ── MAIN CONTENT ── -->
  <div class="container main-content">
    {% block content %}
    {% endblock %}
  </div>

  <!-- ── MOBILE BOTTOM NAV ── -->
  <nav class="mobile-nav d-md-none" aria-label="Mobile navigation">

    <a class="mob-item {% if '/personal/dashboard' in request.path %}active{% endif %}"
       href="/personal/dashboard">
      <i class="bi bi-speedometer2"></i> Home
    </a>

    <a class="mob-item {% if '/personal/properties' in request.path %}active{% endif %}"
       href="/personal/properties">
      <i class="bi bi-building"></i> Property
    </a>

    <a class="mob-item {% if '/personal/add_rent' in request.path %}active{% endif %}"
       href="/personal/add_rent">
      <i class="bi bi-house-door"></i> Rent
    </a>

    <a class="mob-item {% if '/personal/wallet' in request.path %}active{% endif %}"
       href="/personal/wallet">
      <i class="bi bi-wallet2"></i> Wallet
    </a>

    <a class="mob-item {% if '/personal/profile' in request.path %}active{% endif %}"
       href="/personal/profile">
      <i class="bi bi-person-circle"></i> Profile
    </a>

    <a class="mob-item mob-logout" href="/logout">
      <i class="bi bi-box-arrow-right"></i> Logout
    </a>

  </nav>

  <!-- ── FOOTER ── -->
  <footer class="site-footer">
    © 2026 ElixirDraw | All Rights Reserved
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>


</body>
</html>
