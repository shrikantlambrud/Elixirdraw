{% extends "personal/base.html" %}

{% block content %}

<style>

.page-bg{
    background: linear-gradient(120deg,#0f2027,#2c5364);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.property-card{
    width:100%;
    max-width:450px;
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0 12px 30px rgba(0,0,0,0.2);
}

.title{
    text-align:center;
    font-weight:600;
    margin-bottom:20px;
}

.form-control{
    height:45px;
    border-radius:8px;
}

textarea.form-control{
    height:auto;
}

.btn-submit{
    width:100%;
    height:45px;
    border-radius:8px;
    font-weight:600;
}

.map-preview{
    width:100%;
    height:200px;
    border-radius:8px;
    border:1px solid #ddd;
    margin-bottom:15px;
}

.info-box{
    background:#f8f9fa;
    padding:10px;
    border-radius:8px;
    font-size:13px;
    margin-bottom:15px;
    text-align:center;
}

</style>

<div class="page-bg">

<div class="property-card">

<h3 class="title">Add Room / Flat for Rent</h3>

<!-- INFO -->
<div class="info-box">
📞 Your contact number will be used from your profile automatically
</div>

<form method="POST" enctype="multipart/form-data">

<!-- TITLE -->
<input name="title" placeholder="Title (e.g. 1BHK near City Center)" 
class="form-control mb-3" required>

<!-- TYPE -->
<select name="flat_type" class="form-control mb-3" required>

<option value="">Select Type</option>
 <option value="single_room">Single Room</option>
            <option value="1bhk">1 RK</option>
            <option value="1bhk">1 BHK</option>
            <option value="1bhk">2 BHK</option>
            <option value="2bhk">3 BHK</option>
            <option value="3bhk">Other</option>

</select>

<!-- PRICE -->
<input name="price" placeholder="Rent Price ₹" class="form-control mb-3" required>

<!-- LOCATION -->
<input name="city" placeholder="City" class="form-control mb-3" required>

<input name="area" placeholder="Area / Locality" class="form-control mb-3" required>

<!-- MAP -->
<input 
name="map_link"
id="map_link"
placeholder="Google Maps Embed Link"
class="form-control mb-3"
oninput="loadMap()">

<iframe id="map_preview" class="map-preview" style="display:none;"></iframe>

<!-- IMAGE -->
<label class="mb-1">Room / Flat Image</label>
<input type="file" name="image1" class="form-control mb-3">

<!-- DESCRIPTION -->
<textarea name="description" placeholder="Description (Furnished / Deposit / Rules etc.)"
class="form-control mb-3"></textarea>

<button class="btn btn-warning btn-submit">
💰 Post Rent (₹10 Deduct)
</button>

</form>

</div>

</div>

<script>

function loadMap(){

let link = document.getElementById("map_link").value;
let frame = document.getElementById("map_preview");

if(link){
frame.style.display = "block";
frame.src = link;
}
}

</script>

{% endblock %}
