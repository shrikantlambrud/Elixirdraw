<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Property Platform</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        /* ── VARIABLES ── */
        :root {
            --primary: #0ea5e9;
            --primary-dark: #0284c7;
            --primary-light: #e0f2fe;
            --primary-xlight: #f0f9ff;
            --white: #ffffff;
            --text-dark: #0f172a;
            --text-mid: #334155;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --bg-page: #f8fafc;
            --radius-sm: 8px;
            --radius-md: 12px;
            --shadow-nav: 0 1px 12px rgba(14, 165, 233, 0.10);
            --font: 'Plus Jakarta Sans', sans-serif;
        }

        /* ── RESET ── */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        body {
            font-family: var(--font);
            background: var(--bg-page);
            color: var(--text-dark);
            margin: 0;
            padding-bottom: 0;
        }

        .navbar {
            background: var(--white);
            border-bottom: 1px solid var(--border);
            box-shadow: var(--shadow-nav);
            position: sticky;
            top: 0;
            z-index: 1000;
            padding: 10px;
        }

        /* NAVBAR */

        .navbar-brand {
            font-weight: 700;
            font-size: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* LOGO */
        .logo {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            object-fit: cover;
        }

        .nav-brand-name {
            font-size: 19px;
            font-weight: 800;
            color: var(--text-dark);
            letter-spacing: -0.3px;
            line-height: 1;
        }

        .nav-brand-name span {
            color: var(--primary);
        }

        /* Auth buttons */
        .btn-nav-outline {
            font-size: 13px;
            font-weight: 600;
            padding: 7px 18px;
            border-radius: var(--radius-sm);
            border: 1.5px solid var(--border);
            color: var(--text-mid);
            background: transparent;
            text-decoration: none;
            transition: border-color 0.15s, color 0.15s;
            white-space: nowrap;
        }

        .btn-nav-outline:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .btn-nav-primary {
            font-size: 13px;
            font-weight: 700;
            padding: 7px 18px;
            border-radius: var(--radius-sm);
            background: var(--primary);
            color: var(--white);
            border: none;
            text-decoration: none;
            transition: background 0.15s, box-shadow 0.15s;
            white-space: nowrap;
        }

        .btn-nav-primary:hover {
            background: var(--primary-dark);
            box-shadow: 0 3px 10px rgba(14, 165, 233, 0.3);
            color: var(--white);
        }




        /* NAV LINKS */
        .navbar-nav {
            align-items: center;
            gap: 4px;
        }

        .nav-link {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-mid);
            padding: 7px 14px;
            border-radius: var(--radius-sm);
            transition: background 0.15s, color 0.15s;
            white-space: nowrap;
        }

        .nav-link:hover,
        .nav-link.active {
            background: var(--primary-xlight);
            color: var(--primary-dark);
        }




        /* MOBILE FIX */
        @media(max-width:991px) {

            .navbar-nav {
                margin-top: 15px;
                 min-width: 56px;
            }

            .nav-link {
                margin-left: 0;
                padding: 10px 0;
                border-bottom: 1px solid #eee;
            }

            .btn-nav-outline,
            .btn-nav-primary {
                display: block;
                width: 100%;
                text-align: center;
                padding: 10px 16px;
                margin-top: 8px;
                border-radius: var(--radius-sm);
            }

        }

        /* CONTAINER */
        .main-container {
            min-height: 80vh;
        }

        /* FOOTER */
        .footer {
            background: #111;
            color: #ccc;
            padding: 20px;
            text-align: center;
            margin-top: 40px;
        }

        /* MOBILE BOTTOM NAV (OPTIONAL APP STYLE) */
        .mobile-nav {
            display: none;
        }

        @media(max-width:768px) {

            .mobile-nav {
                display: flex;
                position: fixed;
                bottom: 0;
                left: 0;
                width: 100%;
                background: #fff;
                border-top: 1px solid #ddd;
                justify-content: space-around;
                padding: 8px 0;
                z-index: 1000;
            }

            .mobile-nav a {
                text-decoration: none;
                color: #333;
                font-size: 12px;
                text-align: center;
            }

            .mobile-nav i {
                display: block;
                font-size: 18px;
            }

            body {
                padding-bottom: 60px;
            }

        }
    </style>

    <!-- ICONS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"

            <!-- <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav"

                <i class="bi bi-list" style="font-size:20px;"></i>

            <div class="collapse navbar-collapse" id=mainNav>

                    <li class="nav-item">

                    </li>


                </ul>

            </div>

        </div>

    </nav>

    <!-- 🔽 MAIN CONTENT -->

    <div class="container main-container mt-4">

        {% block content %}
        {% endblock %}

    </div>

    <!-- 🔻 FOOTER -->

    <div class="footer">
        © 2026 ElixirDraw | All Rights Reserved
    </div>
