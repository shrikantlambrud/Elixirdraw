{% extends "admin/base.html" %}
{% block content %}

<div class="container mt-4">

<h3>🏢 Pending Business Approval</h3>

{% if users %}

<table class="table table-bordered mt-3">
<thead>
<tr>
<th>ID</th>
<th>Business</th>
<th>Owner</th>
<th>Email</th>
<th>Phone</th>
<th>Action</th>
</tr>
</thead>

<tbody>

{% for u in users %}
<tr>

<td>{{ u.id }}</td>
<td>{{ u.business_name }}</td>
<td>{{ u.name }}</td>
<td>{{ u.email }}</td>
<td>{{ u.phone }}</td>

<td>

<button class="btn btn-success approve-btn" data-id="{{ u.id }}">
Approve
</button>

<button class="btn btn-danger reject-btn" data-id="{{ u.id }}">
Reject
</button>

</td>

</tr>
{% endfor %}

</tbody>
</table>

{% else %}
<p>No pending users</p>
{% endif %}

</div>

<!-- AJAX -->
<script>
document.addEventListener("DOMContentLoaded", function(){

    // APPROVE
    document.querySelectorAll(".approve-btn").forEach(btn => {
        btn.addEventListener("click", function(){

            let userId = this.dataset.id;
            let row = this.closest("tr");

            fetch(`/approve-business/${userId}`)
            .then(res => res.text())
            .then(data => {
                if(data.trim() === "success"){
                    row.remove(); // 🔥 remove row
                }
            });

        });
    });

    // REJECT
    document.querySelectorAll(".reject-btn").forEach(btn => {
        btn.addEventListener("click", function(){

            let userId = this.dataset.id;
            let row = this.closest("tr");

            fetch(`/reject-business/${userId}`)
            .then(res => res.text())
            .then(data => {
                if(data.trim() === "success"){
                    row.remove(); // 🔥 remove row
                }
            });

        });
    });

});
</script>

{% endblock %}
